<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #5A0F1B;
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .card {
    width: 1080px;
    height: 1920px;
    background: #5A0F1B;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 100px;
  }

  /* Date */
  .date-top {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 32px;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 20px;
  }

  /* Decorative line */
  .top-line {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 50px;
    color: #C9A84C;
    font-size: 20px;
    letter-spacing: 8px;
    opacity: 0.8;
  }

  /* Names */
  .names {
    font-family: 'Great Vibes', cursive;
    font-size: 130px;
    color: #FFFFFF;
    line-height: 1.15;
    text-align: center;
    margin-bottom: 10px;
  }
  .ampersand {
    font-family: 'Great Vibes', cursive;
    font-size: 90px;
    color: #C9A84C;
    display: block;
    margin: -5px 0;
  }

  /* Decorative line below names */
  .bottom-line {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 35px 0 50px;
    color: #C9A84C;
    font-size: 20px;
    letter-spacing: 8px;
    opacity: 0.8;
  }

  /* Wedding day label */
  .wedding-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 26px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 40px;
  }

  /* Venue */
  .venue {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 30px;
    color: rgba(255, 255, 255, 0.7);
    text-align: center;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">

    <div class="date-top">08 — 08 — 2026</div>

    <div class="top-line">— ————— —</div>

    <div class="names">
      Caroline
      <span class="ampersand">&amp;</span>
      Daniel
    </div>

    <div class="bottom-line">— ————————— —</div>

    <div class="wedding-label">Wedding Day</div>

    <div class="venue">Bethsaida Park, Kikuyu</div>

  </div>
</body>
</html>
