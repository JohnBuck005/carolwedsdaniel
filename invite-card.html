<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #5A0F1B;
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
  }

  .card {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #5A0F1B;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 30px;
    gap: 10px;
  }

  /* Date */
  .date-top {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(20px, 6vw, 32px);
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #C9A84C;
  }

  /* Decorative line */
  .top-line {
    color: #C9A84C;
    font-size: clamp(12px, 3vw, 20px);
    letter-spacing: 6px;
    opacity: 0.8;
  }

  /* Names */
  .names {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(60px, 18vw, 130px);
    color: #FFFFFF;
    line-height: 1.15;
    text-align: center;
  }
  .ampersand {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(45px, 13vw, 90px);
    color: #C9A84C;
    display: block;
    margin: -3px 0;
  }

  /* Decorative line below names */
  .bottom-line {
    color: #C9A84C;
    font-size: clamp(12px, 3vw, 20px);
    letter-spacing: 6px;
    opacity: 0.8;
  }

  /* Wedding day label */
  .wedding-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(16px, 4vw, 26px);
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #C9A84C;
  }

  /* Venue */
  .venue {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(18px, 5vw, 30px);
    color: rgba(255, 255, 255, 0.7);
    text-align: center;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="card">

    <div class="date-top">08 — 08 — 2026</div>

    <div class="top-line">— ————— —</div>

    <div class="names">
      Caroline
      <span class="ampersand">&amp;</span>
      Daniel
    </div>

    <div class="bottom-line">— ————————— —</div>

    <div class="wedding-label">Wedding Day</div>

    <div class="venue">Bethsaida Park, Kikuyu</div>

  </div>
</body>
</html>
